name: 每日抓取櫃買中心可轉債

on:
  schedule:
    # 每天台灣時間下午 16:30 自動執行 (UTC 時間 08:30)
    - cron: '30 8 * * *'
  workflow_dispatch: # 允許您隨時手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v3

    - name: 建立 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝所需套件 (pandas, xlrd 等)
      run: |
        python -m pip install --upgrade pip
        pip install pandas xlrd requests openpyxl

    - name: 執行 Python 爬蟲程式
      run: python fetch_tpex.py

    - name: 將結果 Excel 存為雲端下載檔
      uses: actions/upload-artifact@v4
      with:
        name: 可轉債大額交易報表
        path: 篩選結果_大額交易標的.xlsx
