name: Daily Update Database

on:
  schedule:
    - cron: '30 9 * * *' # 台灣時間 17:30
  workflow_dispatch:      # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    # 💡 核心：明確授予寫入權限
    permissions:
      contents: write
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests xlrd openpyxl

    - name: Run Scraper
      run: python fetch_tpex.py

    - name: Commit and Push changes
      # 💡 使用官方推薦的自動提交工具，解決 128 錯誤
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update TPEx data $(date +'%Y-%m-%d')"
        file_pattern: 'tpex_database.csv'
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"
